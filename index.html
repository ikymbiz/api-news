<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Orchestrator Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1555.0/aws-sdk.min.js"></script>
    <style>
        /* スマホのキーボード表示時のレイアウト崩れ防止 */
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input, textarea, select { font-size: 16px !important; } /* iOSのズーム防止 */
    </style>
</head>
<body class="bg-slate-900 text-slate-100 pb-24">
    <div class="max-w-xl mx-auto px-4 py-6">
        <header class="flex justify-between items-baseline mb-6 border-b border-slate-800 pb-3">
            <h1 class="text-xl font-black text-blue-400">ORCHESTRATOR</h1>
            <span id="syncStatus" class="text-[10px] text-slate-500 font-mono italic tracking-tighter">Ready</span>
        </header>

        <section class="bg-slate-800 rounded-2xl p-5 shadow-xl mb-5 border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Connect</h2>
                <button onclick="fetchFromGitHub()" class="text-[10px] bg-blue-600 px-3 py-1 rounded-full font-bold">RE-SYNC</button>
            </div>
            
            <div class="space-y-3">
                <input id="ghToken" type="password" placeholder="GitHub Personal Access Token" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:ring-1 ring-blue-500">
                <input id="ghRepo" type="text" placeholder="owner/repo" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:ring-1 ring-blue-500">
            </div>

            <div class="mt-4 grid grid-cols-2 gap-2 text-center">
                <div class="p-2 bg-slate-950 rounded-lg border border-slate-800">
                    <p class="text-[9px] text-slate-500 uppercase">Account</p>
                    <p id="displayAccId" class="text-[10px] font-mono text-blue-300 truncate">---</p>
                </div>
                <div class="p-2 bg-slate-950 rounded-lg border border-slate-800">
                    <p class="text-[9px] text-slate-500 uppercase">Status</p>
                    <p id="authIndicator" class="text-[10px] font-mono text-red-400 uppercase italic">Locked</p>
                </div>
            </div>

            <input id="accId" type="hidden">
            <input id="keyId" type="hidden">
            <input id="secKey" type="hidden"> 

            <button onclick="saveKeys()" class="w-full mt-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-xs font-bold transition-all">ブラウザに認証を記憶</button>
        </section>

        <details class="bg-slate-800 rounded-2xl border border-red-900/30 mb-5 overflow-hidden">
            <summary class="p-4 text-xs font-bold text-red-400 uppercase cursor-pointer flex justify-between">
                Failure Monitor (R2 Logs) <span>▼</span>
            </summary>
            <div id="logContent" class="p-4 bg-slate-950 text-[10px] font-mono h-40 overflow-y-auto space-y-2 border-t border-slate-900">
                <div class="text-slate-600">R2からデータを読み込んでください...</div>
            </div>
        </details>

        <section class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-xs font-bold text-purple-400 uppercase tracking-widest italic">Workflow Chain</h2>
            </div>
            
            <div class="space-y-2">
                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">RSS Feeds</label>
                <textarea id="rssFeeds" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-sm h-32 outline-none focus:ring-1 ring-purple-500 shadow-inner" placeholder="1行に1つのURLを入力"></textarea>
            </div>

            <div id="agentList" class="space-y-3">
                </div>

            <button onclick="addAgent()" class="w-full py-4 border-2 border-dashed border-slate-700 rounded-2xl text-slate-500 font-bold text-xs active:bg-slate-800 transition-all">
                + エージェントを末尾に追加
            </button>
        </section>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-900/90 backdrop-blur-lg border-t border-slate-800 safe-area-bottom z-50">
            <button onclick="saveToR2()" class="w-full bg-gradient-to-r from-red-600 to-rose-600 py-4 rounded-2xl font-black text-lg shadow-2xl active:scale-95 transition-all">
                🚀 R2へ保存 & 反映
            </button>
        </div>
    </div>

    <script>
        let workflow = [];

        // GitHub Variables から全キー（Secret Key 含む）を取得
        async function fetchFromGitHub() {
            const token = document.getElementById('ghToken').value;
            const repo = document.getElementById('ghRepo').value;
            const status = document.getElementById('syncStatus');
            if(!token || !repo) return alert("GitHub TokenとRepoを指定してください");
            
            status.innerText = "Syncing...";
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/variables`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if(!res.ok) throw new Error("GitHub Auth Error");
                const data = await res.json();
                
                data.variables.forEach(v => {
                    if (v.name === 'R2_ACCOUNT_ID') {
                        document.getElementById('accId').value = v.value;
                        document.getElementById('displayAccId').innerText = v.value.substring(0,8) + "...";
                    }
                    if (v.name === 'R2_ACCESS_KEY_ID') {
                        document.getElementById('keyId').value = v.value;
                    }
                    if (v.name === 'R2_SECRET_ACCESS_KEY') {
                        document.getElementById('secKey').value = v.value;
                        document.getElementById('authIndicator').innerText = "Keys OK";
                        document.getElementById('authIndicator').classList.replace('text-red-400', 'text-green-400');
                    }
                });
                status.innerText = "Synced";
                // ID取得後、即座にR2からのロードを試行
                if(document.getElementById('secKey').value) loadFromR2();
            } catch (e) { 
                status.innerText = "Error";
                console.error(e);
            }
        }

        async function loadLogs() {
            try {
                const s3 = await getS3();
                const res = await s3.getObject({ Bucket: 'rss-reports', Key: 'error_log.json' }).promise();
                const logs = JSON.parse(res.Body.toString());
                document.getElementById('logContent').innerHTML = logs.map(l => 
                    `<div class="border-b border-slate-900 pb-1 mb-1">
                        <span class="text-slate-500">[${l.time.split(' ')[1]}]</span> 
                        <span class="text-red-400 font-bold">${l.context}</span>: ${l.message}
                    </div>`
                ).join('');
            } catch (e) { 
                document.getElementById('logContent').innerHTML = `<div class="text-slate-700 italic">No errors logged.</div>`; 
            }
        }

        function addAgent(data = { id: 'agent_' + (workflow.length + 1), model: 'gpt-4o-mini', prompt: '', enabled: true }) {
            workflow.push(data);
            render();
        }

        function render() {
            const container = document.getElementById('agentList');
            container.innerHTML = workflow.map((agent, i) => `
                <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-lg">
                    <div class="flex items-center gap-2 mb-3">
                        <input value="${agent.id}" onchange="workflow[${i}].id=this.value" class="bg-transparent font-black text-purple-400 text-sm w-32 outline-none border-b border-slate-800 focus:border-purple-500">
                        <select onchange="workflow[${i}].model=this.value" class="bg-slate-800 text-[10px] px-2 py-1 rounded-lg font-bold">
                            <option value="gpt-4o-mini" ${agent.model === 'gpt-4o-mini' ? 'selected' : ''}>4o-mini</option>
                            <option value="o3-mini" ${agent.model === 'o3-mini' ? 'selected' : ''}>o3-mini</option>
                        </select>
                        <div class="ml-auto flex gap-3">
                             <input type="checkbox" ${agent.enabled ? 'checked' : ''} onchange="workflow[${i}].enabled=this.checked" class="w-5 h-5 accent-purple-500">
                             <button onclick="workflow.splice(${i},1);render()" class="text-slate-600">✕</button>
                        </div>
                    </div>
                    <textarea onchange="workflow[${i}].prompt=this.value" class="w-full bg-slate-900 p-3 rounded-xl text-xs h-28 text-slate-300 outline-none focus:ring-1 ring-purple-500" placeholder="System Prompt...">${agent.prompt}</textarea>
                </div>
            `).join('');
        }

        async function getS3() {
            return new AWS.S3({
                endpoint: `https://${document.getElementById('accId').value}.r2.cloudflarestorage.com`,
                accessKeyId: document.getElementById('keyId').value,
                secretAccessKey: document.getElementById('secKey').value,
                signatureVersion: 'v4', region: 'auto'
            });
        }

        async function loadFromR2() {
            const status = document.getElementById('syncStatus');
            try {
                const s3 = await getS3();
                const res = await s3.getObject({ Bucket: 'rss-reports', Key: 'prompts.json' }).promise();
                const config = JSON.parse(res.Body.toString());
                document.getElementById('rssFeeds').value = config.rss_feeds.join('\n');
                workflow = config.workflow;
                render();
                await loadLogs();
                status.innerText = "Config Loaded";
            } catch(e) { 
                status.innerText = "R2 Error";
            }
        }

        async function saveToR2() {
            try {
                const s3 = await getS3();
                const config = {
                    rss_feeds: document.getElementById('rssFeeds').value.split('\n').filter(l => l.trim()),
                    workflow: workflow,
                    settings: { fetch_days: 3, score_threshold: 7, embedding_model: "text-embedding-3-small", similarity_threshold: 0.85 }
                };
                await s3.putObject({
                    Bucket: 'rss-reports', Key: 'prompts.json',
                    Body: JSON.stringify(config, null, 2), ContentType: 'application/json'
                }).promise();
                alert('Success: R2 updated.');
            } catch(e) { alert("Save Error: " + e.message); }
        }

        function saveKeys() {
            localStorage.setItem('orch_mobile_v1', JSON.stringify({
                ghRepo: document.getElementById('ghRepo').value,
                ghToken: document.getElementById('ghToken').value
            }));
            alert('記憶しました');
        }

        window.onload = async () => {
            const saved = JSON.parse(localStorage.getItem('orch_mobile_v1') || '{}');
            if (saved.ghToken) {
                document.getElementById('ghToken').value = saved.ghToken;
                document.getElementById('ghRepo').value = saved.ghRepo;
                // ページを開いた瞬間に同期を開始
                await fetchFromGitHub();
            }
        };
    </script>
</body>
</html>
