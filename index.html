<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Orchestrator UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1555.0/aws-sdk.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-blue-400">Agent Orchestrator</h1>

        <div class="grid grid-cols-2 gap-4 mb-8 bg-gray-800 p-6 rounded-lg border border-gray-700">
            <input id="accId" type="text" placeholder="R2 Account ID" class="bg-gray-700 p-2 rounded">
            <input id="keyId" type="text" placeholder="Access Key ID" class="bg-gray-700 p-2 rounded">
            <input id="secKey" type="password" placeholder="Secret Access Key" class="bg-gray-700 p-2 rounded col-span-2">
            <div class="col-span-2 flex gap-2">
                <button onclick="saveKeys()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded">🔑 認証情報を保存</button>
                <button onclick="loadFromR2()" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded">📥 R2から読込</button>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg mb-8 border border-gray-700">
            <h2 class="text-xl font-semibold mb-4 text-green-400">基本設定 (RSS / Threshold)</h2>
            <textarea id="rssFeeds" placeholder="RSSフィードURL（1行に1つ）" class="w-full bg-gray-700 p-2 rounded h-24 mb-4"></textarea>
            <div class="grid grid-cols-2 gap-4">
                <input id="threshold" type="number" placeholder="スコア閾値 (例: 7)" class="bg-gray-700 p-2 rounded">
                <input id="days" type="number" placeholder="遡る日数 (例: 3)" class="bg-gray-700 p-2 rounded">
            </div>
        </div>

        <div id="agentList" class="space-y-4 mb-8">
            <h2 class="text-xl font-semibold text-purple-400">エージェント・パイプライン</h2>
            </div>

        <div class="flex gap-4">
            <button onclick="addAgent()" class="bg-purple-600 hover:bg-purple-500 px-6 py-3 rounded-full font-bold">+ エージェント追加</button>
            <button onclick="saveToR2()" class="bg-red-600 hover:bg-red-500 px-8 py-3 rounded-full font-bold ml-auto text-xl">🚀 R2へ設定を保存</button>
        </div>
    </div>

    <script>
        let workflow = [];

        function addAgent(data = { id: 'new_agent', model: 'gpt-4o-mini', prompt: '', enabled: true }) {
            const index = workflow.length;
            workflow.push(data);
            render();
        }

        function render() {
            const container = document.getElementById('agentList');
            container.innerHTML = workflow.map((agent, i) => `
                <div class="bg-gray-800 p-6 rounded-lg border-l-8 ${agent.id === 'filter' ? 'border-blue-500' : 'border-purple-500'} relative">
                    <div class="flex justify-between items-start mb-4">
                        <input value="${agent.id}" onchange="update(${i}, 'id', this.value)" class="bg-transparent text-xl font-bold focus:outline-none">
                        <div class="space-x-2 text-sm">
                            <button onclick="move(${i}, -1)" class="text-gray-400 hover:text-white">▲ 上へ</button>
                            <button onclick="move(${i}, 1)" class="text-gray-400 hover:text-white">▼ 下へ</button>
                            <button onclick="remove(${i})" class="text-red-500 hover:text-red-400">✖ 削除</button>
                        </div>
                    </div>
                    <select onchange="update(${i}, 'model', this.value)" class="bg-gray-700 p-1 rounded mb-2 w-full">
                        <option value="gpt-4o-mini" ${agent.model === 'gpt-4o-mini' ? 'selected' : ''}>gpt-4o-mini (高速・安価)</option>
                        <option value="o3-mini" ${agent.model === 'o3-mini' ? 'selected' : ''}>o3-mini (高度な推論)</option>
                    </select>
                    <textarea onchange="update(${i}, 'prompt', this.value)" placeholder="プロンプトを入力..." class="w-full bg-gray-700 p-2 rounded h-24">${agent.prompt}</textarea>
                </div>
            `).join('');
        }

        function update(i, key, val) { workflow[i][key] = val; }
        function remove(i) { workflow.splice(i, 1); render(); }
        function move(i, dir) {
            if (i + dir < 0 || i + dir >= workflow.length) return;
            [workflow[i], workflow[i+dir]] = [workflow[i+dir], workflow[i]];
            render();
        }

        function saveKeys() {
            localStorage.setItem('r2_creds', JSON.stringify({
                accId: document.getElementById('accId').value,
                keyId: document.getElementById('keyId').value,
                secKey: document.getElementById('secKey').value
            }));
            alert('認証情報を保存しました（ローカル）');
        }

        async function getS3() {
            const creds = JSON.parse(localStorage.getItem('r2_creds'));
            return new AWS.S3({
                endpoint: `https://${creds.accId}.r2.cloudflarestorage.com`,
                accessKeyId: creds.keyId,
                secretAccessKey: creds.secKey,
                signatureVersion: 'v4',
                region: 'auto'
            });
        }

        async function loadFromR2() {
            const s3 = await getS3();
            const res = await s3.getObject({ Bucket: 'rss-reports', Key: 'prompts.json' }).promise();
            const config = JSON.parse(res.Body.toString());
            document.getElementById('rssFeeds').value = config.rss_feeds.join('\n');
            document.getElementById('threshold').value = config.settings.score_threshold;
            document.getElementById('days').value = config.settings.fetch_days;
            workflow = config.workflow;
            render();
        }

        async function saveToR2() {
            const config = {
                rss_feeds: document.getElementById('rssFeeds').value.split('\n').filter(l => l.trim()),
                workflow: workflow,
                settings: {
                    fetch_days: parseInt(document.getElementById('days').value),
                    score_threshold: parseInt(document.getElementById('threshold').value),
                    embedding_model: "text-embedding-3-small",
                    similarity_threshold: 0.85
                }
            };
            const s3 = await getS3();
            await s3.putObject({
                Bucket: 'rss-reports',
                Key: 'prompts.json',
                Body: JSON.stringify(config, null, 2),
                ContentType: 'application/json'
            }).promise();
            alert('R2への保存が完了しました！Actionsを実行してください。');
        }

        // 初期ロード
        const saved = JSON.parse(localStorage.getItem('r2_creds'));
        if (saved) {
            document.getElementById('accId').value = saved.accId;
            document.getElementById('keyId').value = saved.keyId;
            document.getElementById('secKey').value = saved.secKey;
        }
    </script>
</body>
</html>
