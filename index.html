<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orchestrator v3.2 - Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1555.0/aws-sdk.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { color: #60a5fa; border-top: 2px solid #60a5fa; background: #1e293b; }
        .drag-handle { cursor: grab; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 select-none pb-20">

    <div id="setup-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-3xl border border-slate-800 shadow-2xl space-y-4">
            <h2 class="text-xl font-black text-blue-400 italic">SYSTEM SETUP</h2>
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">Cloudflare Account ID</label>
                    <input type="text" id="cfg-accId" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm text-blue-300 outline-none focus:ring-1 ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">R2 Bucket Name</label>
                    <input type="text" id="cfg-bucket" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm text-blue-300 outline-none focus:ring-1 ring-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">R2 Key ID</label>
                        <input type="password" id="cfg-keyId" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm text-blue-300 outline-none focus:ring-1 ring-blue-500">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">R2 Secret</label>
                        <input type="password" id="cfg-secKey" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm text-blue-300 outline-none focus:ring-1 ring-blue-500">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">GitHub Token (ghp_...)</label>
                    <input type="password" id="cfg-ghToken" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm text-purple-300 outline-none focus:ring-1 ring-purple-500">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">GitHub Repo (user/repo)</label>
                    <input type="text" id="cfg-ghRepo" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm text-purple-300 outline-none focus:ring-1 ring-purple-500">
                </div>
            </div>
            <div class="flex gap-2 pt-2">
                <button onclick="saveConfig()" class="flex-1 bg-blue-600 py-3 rounded-xl font-black text-sm hover:bg-blue-500 transition-all">SAVE & UNLOCK</button>
                <button onclick="closeModal()" class="px-4 bg-slate-800 rounded-xl text-xs font-bold text-slate-400">CANCEL</button>
            </div>
        </div>
    </div>

    <div class="max-w-xl mx-auto p-4 safe-bottom">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black text-blue-400 italic tracking-tighter">ORCHESTRATOR v3.2</h1>
            <div class="flex items-center gap-3">
                <button onclick="openModal()" class="text-[10px] bg-slate-800 px-2 py-1 rounded border border-slate-700 text-slate-400">SETTINGS</button>
                <span id="st" class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Locked</span>
            </div>
        </header>

        <section id="tab-rss" class="tab-content active space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xs font-bold text-blue-400 uppercase tracking-widest italic">RSS Feed Sources</h2>
                <button onclick="addRss()" class="bg-blue-600 text-[10px] px-3 py-1 rounded-full font-bold">+ ADD FEED</button>
            </div>
            <div id="rssList" class="space-y-3"></div>
        </section>

        <section id="tab-workflow" class="tab-content space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xs font-bold text-purple-400 uppercase tracking-widest italic">Workflow Pipeline</h2>
                <button onclick="addAgent()" class="bg-purple-600 text-[10px] px-3 py-1 rounded-full font-bold">+ AGENT</button>
            </div>
            <div id="agentList" class="space-y-4"></div>
        </section>

        <section id="tab-output" class="tab-content space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-widest italic">Latest Output</h2>
                <button onclick="loadOutput()" class="text-[10px] text-slate-500 underline italic tracking-tighter">Refresh</button>
            </div>
            <div id="outputList" class="space-y-4"></div>
        </section>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800 z-50">
        <div class="flex justify-around items-stretch h-16 max-w-xl mx-auto">
            <button onclick="switchTab('rss')" id="nav-rss" class="flex-1 flex flex-col items-center justify-center active-tab">
                <span class="text-[10px] font-bold uppercase">RSS</span>
            </button>
            <button onclick="switchTab('workflow')" id="nav-workflow" class="flex-1 flex flex-col items-center justify-center">
                <span class="text-[10px] font-bold uppercase">Flow</span>
            </button>
            <button onclick="switchTab('output')" id="nav-output" class="flex-1 flex flex-col items-center justify-center">
                <span class="text-[10px] font-bold uppercase">Result</span>
            </button>
            <button onclick="saveToR2()" class="flex-1 bg-blue-600 flex flex-col items-center justify-center active:scale-95 transition-transform">
                <span class="text-[10px] font-black leading-tight text-white uppercase">SAVE</span>
            </button>
            <button onclick="triggerRun()" class="flex-1 bg-emerald-600 flex flex-col items-center justify-center active:scale-95 transition-transform">
                <span class="text-[10px] font-black leading-tight text-white uppercase">RUN</span>
            </button>
        </div>
        <div class="bg-slate-950 h-[env(safe-area-inset-bottom)]"></div>
    </nav>

    <script>
        let CONFIG = {};
        let rss_feeds = [];
        let workflow = [];
        // デフォルト値をセットしておくことで、読み込み中も選択肢が表示されるようにする
        let availableModels = [
            { "value": "gpt-4o-mini", "label": "GPT-4o Mini" },
            { "value": "claude-3-5-sonnet-latest", "label": "Claude 3.5 Sonnet" }
        ];
        let sortableInstance = null;

        window.onload = () => {
            const saved = localStorage.getItem('orchestrator_config');
            if (saved) {
                CONFIG = JSON.parse(saved);
                bootApp();
            } else {
                openModal();
            }
        };

        function openModal() { document.getElementById('setup-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('setup-modal').classList.add('hidden'); }

        function saveConfig() {
            CONFIG = {
                accId: document.getElementById('cfg-accId').value,
                r2Bucket: document.getElementById('cfg-bucket').value,
                keyId: document.getElementById('cfg-keyId').value,
                secKey: document.getElementById('cfg-secKey').value,
                ghToken: document.getElementById('cfg-ghToken').value,
                ghRepo: document.getElementById('cfg-ghRepo').value
            };
            localStorage.setItem('orchestrator_config', JSON.stringify(CONFIG));
            closeModal();
            bootApp();
        }

        async function bootApp() {
            document.getElementById('st').innerText = "Syncing...";
            const s3 = await getS3();

            // models.json を取得して選択肢を更新
            try {
                const mRes = await s3.getObject({ Bucket: CONFIG.r2Bucket, Key: 'models.json' }).promise();
                availableModels = JSON.parse(mRes.Body.toString());
                console.log("Models updated from R2");
            } catch(e) {
                console.warn("models.json not found in R2. Using defaults.");
            }

            await loadFromR2();
            await loadOutput();
        }

        async function getS3() {
            return new AWS.S3({
                endpoint: `https://${CONFIG.accId}.r2.cloudflarestorage.com`,
                accessKeyId: CONFIG.keyId, secretAccessKey: CONFIG.secKey,
                signatureVersion: 'v4', region: 'auto'
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`nav-${tabId}`).classList.add('active-tab');
        }

        async function loadFromR2() {
            try {
                const s3 = await getS3();
                const res = await s3.getObject({ Bucket: CONFIG.r2Bucket, Key: 'prompts.json' }).promise();
                const config = JSON.parse(res.Body.toString());
                rss_feeds = (config.rss_feeds || []).map(item => 
                    typeof item === 'string' ? { name: "Untitled", url: item } : item
                );
                workflow = config.workflow || [];
                renderRss();
                renderWorkflow(); // ここで availableModels が使われる
                document.getElementById('st').innerText = "Online";
            } catch(e) { document.getElementById('st').innerText = "R2 Error"; }
        }

        async function loadOutput() {
            const container = document.getElementById('outputList');
            container.innerHTML = "<p class='text-center text-[10px] py-10 italic text-slate-500'>Loading...</p>";
            try {
                const s3 = await getS3();
                const res = await s3.getObject({ Bucket: CONFIG.r2Bucket, Key: 'api_output.json' }).promise();
                const outputs = JSON.parse(res.Body.toString());
                container.innerHTML = outputs.reverse().slice(0, 20).map(item => `
                    <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <div class="text-[9px] text-slate-500 mb-1 font-mono">${new Date(item.date).toLocaleString()}</div>
                        <h3 class="font-bold text-xs mb-2 text-blue-300"><a href="${item.link}" target="_blank">${item.title}</a></h3>
                        <div class="text-[11px] text-slate-400 leading-relaxed whitespace-pre-wrap">${item.analysis}</div>
                    </div>
                `).join('');
            } catch(e) { container.innerHTML = "<p class='text-center text-xs text-red-400 py-10'>No data found.</p>"; }
        }

        function renderRss() {
            const container = document.getElementById('rssList');
            container.innerHTML = rss_feeds.map((item, i) => `
                <div class="bg-slate-800/40 p-3 rounded-2xl border border-slate-700/50 relative">
                    <button onclick="rss_feeds.splice(${i},1);renderRss()" class="absolute top-2 right-2 text-slate-600 p-1">✕</button>
                    <div class="space-y-2 pr-6">
                        <input type="text" placeholder="Site Name" value="${item.name || ''}" 
                               onchange="rss_feeds[${i}].name=this.value" 
                               class="w-full bg-transparent text-[10px] font-bold text-blue-400 border-b border-slate-700 outline-none pb-1">
                        <input type="text" placeholder="URL (https://...)" value="${item.url || ''}" 
                               onchange="rss_feeds[${i}].url=this.value" 
                               class="w-full bg-transparent text-xs text-slate-400 outline-none">
                    </div>
                </div>
            `).join('');
        }

        function addRss() { rss_feeds.unshift({ name: "", url: "" }); renderRss(); }

        function renderWorkflow() {
            const container = document.getElementById('agentList');
            if (sortableInstance) sortableInstance.destroy();
            container.innerHTML = workflow.map((agent, i) => `
                <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 mb-4">
                    <div class="flex items-center gap-2 mb-3 flex-wrap">
                        <div class="drag-handle p-2 text-slate-700 hover:text-blue-500">☰</div>
                        <input value="${agent.id}" onchange="workflow[${i}].id=this.value" class="bg-transparent font-black text-blue-400 text-sm w-24 outline-none border-b border-slate-900">
                        <select onchange="workflow[${i}].scope=this.value" class="bg-slate-800 text-[9px] px-2 py-1 rounded-lg font-bold text-purple-300">
                            <option value="item" ${agent.scope === 'item' ? 'selected' : ''}>Individual</option>
                            <option value="collection" ${agent.scope === 'collection' ? 'selected' : ''}>Batch</option>
                        </select>
                        <select onchange="workflow[${i}].model=this.value" class="bg-slate-800 text-[10px] px-2 py-1 rounded-lg font-bold flex-1 text-slate-300">
                            ${availableModels.map(m => `<option value="${m.value}" ${agent.model === m.value ? 'selected' : ''}>${m.label}</option>`).join('')}
                        </select>
                        <button onclick="workflow.splice(${i},1);renderWorkflow()" class="text-slate-600 text-xl ml-2">✕</button>
                    </div>
                    <textarea onchange="workflow[${i}].prompt=this.value" class="w-full bg-slate-900 p-3 rounded-xl text-xs h-32 text-slate-400 outline-none focus:ring-1 ring-blue-500">${agent.prompt}</textarea>
                </div>
            `).join('');
            sortableInstance = new Sortable(container, {
                handle: '.drag-handle', animation: 250,
                onEnd: (e) => {
                    const movedItem = workflow.splice(e.oldIndex, 1)[0];
                    workflow.splice(e.newIndex, 0, movedItem);
                }
            });
        }

        function addAgent() {
            workflow.push({ id: 'agent_'+Date.now(), model: availableModels[0]?.value || 'gpt-4o-mini', prompt:'', enabled:true, scope: 'item' });
            renderWorkflow();
        }

        async function saveToR2() {
            try {
                document.getElementById('st').innerText = "Syncing...";
                const s3 = await getS3();
                const config = { 
                    rss_feeds: rss_feeds.filter(f => f.url.trim()), 
                    workflow: workflow, 
                    settings: { fetch_days:3, score_threshold:7, embedding_model:"text-embedding-3-small", similarity_threshold:0.85 } 
                };
                await s3.putObject({ Bucket: CONFIG.r2Bucket, Key: 'prompts.json', Body: JSON.stringify(config,null,2), ContentType: 'application/json' }).promise();
                document.getElementById('st').innerText = "Online";
                alert('Saved to R2');
            } catch(e) { alert("Save Error"); }
        }

        async function triggerRun() {
            if (!confirm('Start Orchestrator?')) return;
            try {
                document.getElementById('st').innerText = "Dispatching...";
                const response = await fetch(`https://api.github.com/repos/${CONFIG.ghRepo}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.ghToken}`,
                        'Accept': 'application/vnd.github+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ event_type: 'manual_trigger' })
                });
                if (response.ok) {
                    alert('GitHub Action triggered');
                    document.getElementById('st').innerText = "Running";
                } else { throw new Error('API Error'); }
            } catch(e) { alert(`Error: ${e.message}`); }
            finally { setTimeout(() => { document.getElementById('st').innerText = "Online"; }, 3000); }
        }
    </script>
</body>
</html>
