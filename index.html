<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agent Admin Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1555.0/aws-sdk.min.js"></script>
    <style> .safe-bottom { padding-bottom: env(safe-area-inset-bottom); } </style>
</head>
<body class="bg-slate-900 text-slate-100 select-none">
    <div class="max-w-xl mx-auto p-4 pb-28">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black text-blue-400">ORCHESTRATOR</h1>
            <span id="st" class="text-[10px] font-mono text-slate-500 italic">Standby</span>
        </header>

        <section class="bg-slate-800 rounded-2xl p-4 mb-4 border border-slate-700 space-y-3">
            <input id="ghToken" type="password" placeholder="GitHub Token" class="w-full bg-slate-900 p-3 rounded-xl text-sm outline-none border border-slate-700 focus:border-blue-500">
            <input id="ghRepo" type="text" placeholder="owner/repo" class="w-full bg-slate-900 p-3 rounded-xl text-sm outline-none border border-slate-700">
            <input id="secKey" type="password" placeholder="R2 Secret Key" class="w-full bg-slate-900 p-3 rounded-xl text-sm outline-none border border-blue-900/50">
            
            <div class="grid grid-cols-2 gap-2 text-[10px] font-mono text-blue-300">
                <div class="bg-slate-950 p-2 rounded truncate">ID: <span id="dAcc">---</span></div>
                <div id="dAuth" class="bg-slate-950 p-2 rounded text-red-400 text-center uppercase">Locked</div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="fetchFromGitHub()" class="flex-1 bg-slate-700 py-3 rounded-xl text-xs font-bold active:bg-slate-600">Sync GitHub</button>
                <button onclick="saveKeys()" class="flex-1 bg-blue-600 py-3 rounded-xl text-xs font-bold active:bg-blue-500">Save Local</button>
            </div>
        </section>

        <section class="space-y-4">
            <textarea id="rssFeeds" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-sm h-32 outline-none focus:ring-1 ring-purple-500" placeholder="RSS URLs..."></textarea>
            <div id="agentList" class="space-y-4"></div>
            <button onclick="addAgent()" class="w-full py-4 border-2 border-dashed border-slate-700 rounded-2xl text-slate-500 font-bold text-xs">+ Add Agent</button>
        </section>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-900/90 backdrop-blur-xl border-t border-slate-800 safe-bottom z-50">
            <button onclick="saveToR2()" class="w-full bg-gradient-to-r from-red-600 to-rose-600 py-4 rounded-2xl font-black text-lg shadow-2xl active:scale-95">🚀 R2へ保存</button>
        </div>
    </div>

    <input id="accId" type="hidden"><input id="keyId" type="hidden">

    <script>
        let workflow = [];

        async function fetchFromGitHub() {
            const token = document.getElementById('ghToken').value;
            const repo = document.getElementById('ghRepo').value;
            const st = document.getElementById('st');
            if(!token || !repo) return alert("GitHub Token & Repo required");
            
            st.innerText = "Syncing...";
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/variables`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if(!res.ok) throw new Error("Check Token or Repo Path");
                const data = await res.json();
                if(!data.variables || data.variables.length === 0) throw new Error("Variables are empty. Move Secrets to Variables tab.");

                data.variables.forEach(v => {
                    if (v.name === 'R2_ACCOUNT_ID') {
                        document.getElementById('accId').value = v.value;
                        document.getElementById('dAcc').innerText = v.value.substring(0,8)+"...";
                    }
                    if (v.name === 'R2_ACCESS_KEY_ID') document.getElementById('keyId').value = v.value;
                });
                st.innerText = "GitHub: OK";
                check();
                if(document.getElementById('secKey').value) loadFromR2();
            } catch (e) { 
                st.innerText = "Sync Error"; 
                alert("Error: " + e.message + "\nVariablesタブにIDが登録されているか確認してください。");
            }
        }

        async function getS3() {
            return new AWS.S3({
                endpoint: `https://${document.getElementById('accId').value}.r2.cloudflarestorage.com`,
                accessKeyId: document.getElementById('keyId').value,
                secretAccessKey: document.getElementById('secKey').value,
                signatureVersion: 'v4', region: 'auto'
            });
        }

        async function loadFromR2() {
            try {
                const s3 = await getS3();
                const res = await s3.getObject({ Bucket: 'rss-reports', Key: 'prompts.json' }).promise();
                const config = JSON.parse(res.Body.toString());
                document.getElementById('rssFeeds').value = config.rss_feeds.join('\n');
                workflow = config.workflow;
                render();
                document.getElementById('st').innerText = "R2: Ready";
            } catch(e) { document.getElementById('st').innerText = "R2: Error"; }
        }

        function render() {
            const container = document.getElementById('agentList');
            container.innerHTML = workflow.map((agent, i) => `
                <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-xl">
                    <div class="flex items-center gap-2 mb-2">
                        <input value="${agent.id}" onchange="workflow[${i}].id=this.value" class="bg-transparent font-black text-blue-400 text-sm outline-none">
                        <select onchange="workflow[${i}].model=this.value" class="bg-slate-800 text-[10px] px-2 py-1 rounded-lg">
                            <option value="gpt-4o-mini" ${agent.model==='gpt-4o-mini'?'selected':''}>4o-mini</option>
                            <option value="o3-mini" ${agent.model==='o3-mini'?'selected':''}>o3-mini</option>
                        </select>
                        <div class="ml-auto flex gap-2">
                            <input type="checkbox" ${agent.enabled?'checked':''} onchange="workflow[${i}].enabled=this.checked" class="w-5 h-5 accent-blue-500">
                            <button onclick="workflow.splice(${i},1);render()" class="text-slate-600">✕</button>
                        </div>
                    </div>
                    <textarea onchange="workflow[${i}].prompt=this.value" class="w-full bg-slate-900 p-3 rounded-xl text-xs h-28 text-slate-300 outline-none" placeholder="Prompt...">${agent.prompt}</textarea>
                </div>
            `).join('');
        }

        function addAgent() { workflow.push({ id: 'agent_'+(workflow.length+1), model:'gpt-4o-mini', prompt:'', enabled:true }); render(); }
        async function saveToR2() {
            try {
                const s3 = await getS3();
                const config = { rss_feeds: document.getElementById('rssFeeds').value.split('\n').filter(l=>l.trim()), workflow, settings: { fetch_days:3, score_threshold:7, embedding_model:"text-embedding-3-small", similarity_threshold:0.85 } };
                await s3.putObject({ Bucket:'rss-reports', Key:'prompts.json', Body:JSON.stringify(config,null,2), ContentType:'application/json' }).promise();
                alert('Success!');
            } catch(e) { alert("Save Error"); }
        }

        function saveKeys() { localStorage.setItem('orch_mobile_v2', JSON.stringify({ ghRepo: document.getElementById('ghRepo').value, ghToken: document.getElementById('ghToken').value, secKey: document.getElementById('secKey').value })); alert('Saved'); fetchFromGitHub(); }
        function check() { if(document.getElementById('secKey').value) { document.getElementById('dAuth').innerText = "Ready"; document.getElementById('dAuth').className = "bg-slate-950 p-2 rounded text-green-400 text-center"; } }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('orch_mobile_v2') || '{}');
            if (saved.ghToken) {
                document.getElementById('ghToken').value = saved.ghToken;
                document.getElementById('ghRepo').value = saved.ghRepo;
                document.getElementById('secKey').value = saved.secKey || '';
                fetchFromGitHub();
            }
        };
    </script>
</body>
</html>
