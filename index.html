<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Orchestrator Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1555.0/aws-sdk.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-blue-400">Intelligence Orchestrator UI</h1>

        <div class="bg-gray-800 p-6 rounded-lg mb-8 border border-gray-700">
            <h2 class="text-xl font-bold mb-4">🔑 認証・環境設定</h2>
            <div class="grid grid-cols-2 gap-4">
                <input id="ghToken" type="password" placeholder="GitHub Personal Access Token" class="bg-gray-700 p-2 rounded">
                <input id="ghRepo" type="text" placeholder="owner/repo" class="bg-gray-700 p-2 rounded">
                <button onclick="fetchFromGitHub()" class="bg-gray-600 hover:bg-gray-500 p-2 rounded col-span-2">🐙 GitHub VariablesからR2設定を取得</button>
                <input id="accId" type="text" placeholder="R2 Account ID" class="bg-gray-700 p-2 rounded">
                <input id="keyId" type="text" placeholder="Access Key ID" class="bg-gray-700 p-2 rounded">
                <input id="secKey" type="password" placeholder="Secret Access Key" class="bg-gray-700 p-2 rounded col-span-2">
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="saveKeys()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded">ローカル保存</button>
                <button onclick="loadFromR2()" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded">📥 R2から読込</button>
            </div>
        </div>

        <div class="bg-red-900/20 border border-red-700 p-6 rounded-lg mb-8">
            <h2 class="text-xl font-bold mb-4 text-red-400">⚠️ 最近の失敗ログ</h2>
            <button onclick="loadLogs()" class="text-xs bg-red-800 px-2 py-1 rounded mb-4">ログを更新</button>
            <div id="logContent" class="text-xs font-mono max-h-40 overflow-y-auto space-y-1"></div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg mb-8">
            <h2 class="text-xl font-bold mb-4">⚙️ プロンプト・ワークフロー</h2>
            <textarea id="rssFeeds" class="w-full bg-gray-700 p-2 rounded h-20 mb-4" placeholder="RSS URL (1行に1つ)"></textarea>
            <div id="agentList" class="space-y-4"></div>
            <button onclick="addAgent()" class="mt-4 bg-purple-600 px-4 py-2 rounded">+ 追加</button>
        </div>

        <button onclick="saveToR2()" class="w-full bg-red-600 hover:bg-red-500 py-4 rounded-xl font-bold text-2xl">🚀 R2へ全設定を保存 (即時反映)</button>
    </div>

    <script>
        let workflow = [];

        async function fetchFromGitHub() {
            const token = document.getElementById('ghToken').value;
            const repo = document.getElementById('ghRepo').value;
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/variables`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                data.variables.forEach(v => {
                    if (v.name === 'R2_ACCOUNT_ID') document.getElementById('accId').value = v.value;
                    if (v.name === 'R2_ACCESS_KEY_ID') document.getElementById('keyId').value = v.value;
                });
                alert('取得完了');
            } catch (e) { alert('GitHub連携失敗: ' + e.message); }
        }

        async function loadLogs() {
            const s3 = await getS3();
            try {
                const res = await s3.getObject({ Bucket: 'rss-reports', Key: 'error_log.json' }).promise();
                const logs = JSON.parse(res.Body.toString());
                document.getElementById('logContent').innerHTML = logs.map(l => 
                    `<div>[${l.time.split('T')[1].split('.')[0]}] <b>${l.context}</b>: ${l.message}</div>`
                ).join('');
            } catch (e) { document.getElementById('logContent').innerText = "ログなし"; }
        }

        // --- 以下、既存ロジックを一切削らずに統合 ---
        function addAgent(data = { id: 'agent', model: 'gpt-4o-mini', prompt: '', enabled: true }) {
            workflow.push(data);
            render();
        }

        function render() {
            const container = document.getElementById('agentList');
            container.innerHTML = workflow.map((agent, i) => `
                <div class="bg-gray-700 p-4 rounded relative">
                    <input value="${agent.id}" onchange="workflow[${i}].id=this.value" class="bg-transparent font-bold">
                    <select onchange="workflow[${i}].model=this.value" class="bg-gray-600 ml-4">
                        <option value="gpt-4o-mini" ${agent.model === 'gpt-4o-mini' ? 'selected' : ''}>gpt-4o-mini</option>
                        <option value="o3-mini" ${agent.model === 'o3-mini' ? 'selected' : ''}>o3-mini</option>
                    </select>
                    <textarea onchange="workflow[${i}].prompt=this.value" class="w-full bg-gray-800 mt-2 p-2 rounded text-sm">${agent.prompt}</textarea>
                    <button onclick="workflow.splice(${i},1);render()" class="absolute top-2 right-2 text-red-400">✕</button>
                </div>
            `).join('');
        }

        async function getS3() {
            return new AWS.S3({
                endpoint: `https://${document.getElementById('accId').value}.r2.cloudflarestorage.com`,
                accessKeyId: document.getElementById('keyId').value,
                secretAccessKey: document.getElementById('secKey').value,
                signatureVersion: 'v4', region: 'auto'
            });
        }

        async function loadFromR2() {
            const s3 = await getS3();
            const res = await s3.getObject({ Bucket: 'rss-reports', Key: 'prompts.json' }).promise();
            const config = JSON.parse(res.Body.toString());
            document.getElementById('rssFeeds').value = config.rss_feeds.join('\n');
            workflow = config.workflow;
            render();
            loadLogs();
        }

        async function saveToR2() {
            const s3 = await getS3();
            const config = {
                rss_feeds: document.getElementById('rssFeeds').value.split('\n').filter(l => l.trim()),
                workflow: workflow,
                settings: { fetch_days: 3, score_threshold: 7, embedding_model: "text-embedding-3-small", similarity_threshold: 0.85 }
            };
            await s3.putObject({
                Bucket: 'rss-reports', Key: 'prompts.json',
                Body: JSON.stringify(config, null, 2), ContentType: 'application/json'
            }).promise();
            alert('R2保存完了');
        }

        function saveKeys() {
            localStorage.setItem('orch_creds', JSON.stringify({
                accId: document.getElementById('accId').value,
                keyId: document.getElementById('keyId').value,
                secKey: document.getElementById('secKey').value,
                ghRepo: document.getElementById('ghRepo').value
            }));
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('orch_creds') || '{}');
            if (saved.accId) {
                document.getElementById('accId').value = saved.accId;
                document.getElementById('keyId').value = saved.keyId;
                document.getElementById('secKey').value = saved.secKey;
                document.getElementById('ghRepo').value = saved.ghRepo;
            }
        };
    </script>
</body>
</html>
