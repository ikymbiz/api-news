<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orchestrator v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1555.0/aws-sdk.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="vault.js"></script>
    <style>
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { color: #60a5fa; border-top: 2px solid #60a5fa; background: #1e293b; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 select-none pb-20">
    <div class="max-w-xl mx-auto p-4 safe-bottom">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black text-blue-400 italic tracking-tighter">ORCHESTRATOR v3</h1>
            <span id="st" class="text-[10px] font-mono text-slate-500 uppercase">Initialising</span>
        </header>

        <section id="tab-rss" class="tab-content active space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xs font-bold text-blue-400 uppercase tracking-widest italic">RSS Feeds</h2>
                <button onclick="addRss()" class="bg-blue-600 text-[10px] px-3 py-1 rounded-full font-bold">+ ADD</button>
            </div>
            <div id="rssList" class="space-y-2"></div>
        </section>

        <section id="tab-workflow" class="tab-content space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xs font-bold text-purple-400 uppercase tracking-widest italic">Workflow</h2>
                <button onclick="addAgent()" class="bg-purple-600 text-[10px] px-3 py-1 rounded-full font-bold">+ AGENT</button>
            </div>
            <div id="agentList" class="space-y-4"></div>
        </section>

        <section id="tab-output" class="tab-content space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-widest italic">Latest Output</h2>
                <button onclick="loadOutput()" class="text-[10px] text-slate-500 underline italic tracking-tighter">Refresh</button>
            </div>
            <div id="outputList" class="space-y-4"></div>
        </section>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800 z-50">
        <div class="flex justify-around items-stretch h-16 max-w-xl mx-auto">
            <button onclick="switchTab('rss')" id="nav-rss" class="flex-1 flex flex-col items-center justify-center transition-all">
                <span class="text-[10px] font-bold">RSS</span>
            </button>
            <button onclick="switchTab('workflow')" id="nav-workflow" class="flex-1 flex flex-col items-center justify-center transition-all">
                <span class="text-[10px] font-bold">WORKFLOW</span>
            </button>
            <button onclick="switchTab('output')" id="nav-output" class="flex-1 flex flex-col items-center justify-center transition-all">
                <span class="text-[10px] font-bold">OUTPUT</span>
            </button>
            <button onclick="saveToR2()" class="flex-1 bg-blue-600 flex flex-col items-center justify-center active:scale-95 transition-transform">
                <span class="text-[10px] font-black leading-tight text-white">SAVE<br>DEPLOY</span>
            </button>
        </div>
        <div class="bg-slate-950 h-[env(safe-area-inset-bottom)]"></div>
    </nav>

    <script>
        let rss_feeds = [];
        let workflow = [];
        let availableModels = [];

        window.onload = async () => {
            await loadModels();
            if (window.VAULT) {
                document.getElementById('st').innerText = "Authenticated";
                await loadFromR2();
                await loadOutput();
            }
        };

        async function loadModels() {
            try {
                const response = await fetch('models.json');
                availableModels = await response.json();
            } catch (e) {
                availableModels = [{ "value": "gpt-4o-mini", "label": "GPT-4o Mini" }, { "value": "o3-mini", "label": "o3-mini" }];
            }
        }

        async function getS3() {
            return new AWS.S3({
                endpoint: `https://${window.VAULT.accId}.r2.cloudflarestorage.com`,
                accessKeyId: window.VAULT.keyId, secretAccessKey: window.VAULT.secKey,
                signatureVersion: 'v4', region: 'auto'
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`nav-${tabId}`).classList.add('active-tab');
        }

        async function loadFromR2() {
            try {
                const s3 = await getS3();
                const res = await s3.getObject({ Bucket: window.VAULT.r2Bucket, Key: 'prompts.json' }).promise();
                const config = JSON.parse(res.Body.toString());
                rss_feeds = config.rss_feeds || [];
                workflow = config.workflow || [];
                renderRss();
                renderWorkflow();
                switchTab('rss');
                document.getElementById('st').innerText = "Online";
            } catch(e) { document.getElementById('st').innerText = "R2 Error"; }
        }

        async function loadOutput() {
            const container = document.getElementById('outputList');
            container.innerHTML = "<p class='text-center text-[10px] text-slate-500 py-10 italic'>Loading results...</p>";
            try {
                const s3 = await getS3();
                const res = await s3.getObject({ Bucket: window.VAULT.r2Bucket, Key: 'api_output.json' }).promise();
                const outputs = JSON.parse(res.Body.toString());
                container.innerHTML = outputs.reverse().map(item => `
                    <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <div class="text-[10px] text-slate-500 mb-1">${new Date(item.date).toLocaleString()}</div>
                        <h3 class="font-bold text-sm mb-2 text-blue-300"><a href="${item.link}" target="_blank">${item.title}</a></h3>
                        <div class="text-xs text-slate-400 leading-relaxed whitespace-pre-wrap">${item.analysis}</div>
                    </div>
                `).join('');
            } catch(e) { container.innerHTML = "<p class='text-center text-xs text-red-400 py-10'>No output found or R2 Error.</p>"; }
        }

        function renderRss() {
            const container = document.getElementById('rssList');
            container.innerHTML = rss_feeds.map((url, i) => `
                <div class="flex items-center gap-2 bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                    <input type="text" value="${url}" onchange="rss_feeds[${i}]=this.value" class="bg-transparent flex-1 text-xs outline-none text-slate-300">
                    <button onclick="rss_feeds.splice(${i},1);renderRss()" class="text-slate-500 text-lg px-2">✕</button>
                </div>
            `).join('');
        }

        function addRss() { rss_feeds.unshift(""); renderRss(); }

        function renderWorkflow() {
            const container = document.getElementById('agentList');
            container.innerHTML = workflow.map((agent, i) => `
                <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="drag-handle p-2 text-slate-700 cursor-move">☰</div>
                        <input value="${agent.id}" onchange="workflow[${i}].id=this.value" class="bg-transparent font-black text-blue-400 text-sm w-24 outline-none border-b border-slate-900">
                        <select onchange="workflow[${i}].model=this.value" class="bg-slate-800 text-[10px] px-2 py-1 rounded-lg font-bold flex-1">
                            ${availableModels.map(m => `<option value="${m.value}" ${agent.model === m.value ? 'selected' : ''}>${m.label}</option>`).join('')}
                        </select>
                        <button onclick="workflow.splice(${i},1);renderWorkflow()" class="text-slate-600 text-xl ml-2">✕</button>
                    </div>
                    <textarea onchange="workflow[${i}].prompt=this.value" class="w-full bg-slate-900 p-3 rounded-xl text-xs h-32 text-slate-400 outline-none focus:ring-1 ring-blue-500">${agent.prompt}</textarea>
                </div>
            `).join('');
            new Sortable(container, { handle: '.drag-handle', animation: 200 });
        }

        function addAgent() {
            workflow.push({ id: 'agent_'+Date.now(), model: availableModels[0].value, prompt:'', enabled:true });
            renderWorkflow();
        }

        async function saveToR2() {
            try {
                const s3 = await getS3();
                const config = { 
                    rss_feeds: rss_feeds.filter(u => u.trim()), workflow, 
                    settings: { fetch_days:3, score_threshold:7, embedding_model:"text-embedding-3-small", similarity_threshold:0.85 } 
                };
                await s3.putObject({ Bucket: window.VAULT.r2Bucket, Key: 'prompts.json', Body: JSON.stringify(config,null,2), ContentType: 'application/json' }).promise();
                alert('Saved to R2!');
            } catch(e) { alert("Save Error"); }
        }
    </script>
</body>
</html>
