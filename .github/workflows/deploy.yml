name: Deploy Dashboard

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    # ここを復活させます（GitHub Pagesのデプロイには必須です）
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Public Config into HTML files
        run: |
          sed -i "s|__R2_DOMAIN__|ai-news.feed.ddashpot.com|g" *.html
          sed -i "s|__GH_REPO__|${{ github.repository }}|g" *.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
