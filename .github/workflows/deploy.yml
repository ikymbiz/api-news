name: Deploy Dashboard

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Public Config into HTML files
        run: |
          # 秘密鍵は埋め込まず、公開URLに必要な情報のみを置換します
          # カスタムドメインを使用する場合、アカウントIDやキーは不要になります
          sed -i "s|__R2_DOMAIN__|ai-news.feed.ddashpot.com|g" *.html
          sed -i "s|__GH_REPO__|${{ github.repository }}|g" *.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
