<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Orchestrator Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1555.0/aws-sdk.min.js"></script>
    <style>
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input, textarea, select { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 pb-24 font-sans select-none">
    <div class="max-w-xl mx-auto px-4 py-6">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black text-blue-400">ORCHESTRATOR</h1>
            <div id="syncStatus" class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">READY</div>
        </header>

        <section class="bg-slate-800 rounded-2xl p-5 shadow-xl mb-6 border border-slate-700">
            <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Auth & Connectivity</h2>
            <div class="space-y-3">
                <input id="ghToken" type="password" placeholder="GitHub Token (Variable取得用)" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-blue-500">
                <input id="ghRepo" type="text" placeholder="owner/repo" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                
                <div class="grid grid-cols-2 gap-2 py-2">
                    <div class="bg-slate-950 p-2 rounded-lg border border-slate-900">
                        <p class="text-[8px] text-slate-600 uppercase">Account ID</p>
                        <p id="displayAccId" class="text-[10px] font-mono text-blue-300 truncate">---</p>
                    </div>
                    <div class="bg-slate-950 p-2 rounded-lg border border-slate-900">
                        <p class="text-[8px] text-slate-600 uppercase">Key Status</p>
                        <p id="authIndicator" class="text-[10px] font-mono text-yellow-500 italic">WAITING</p>
                    </div>
                </div>

                <div class="space-y-1">
                    <p class="text-[10px] text-slate-500 ml-1 uppercase font-bold">R2 Secret Key (手動入力 / 安全に記憶)</p>
                    <input id="secKey" type="password" placeholder="R2 Secret Access Key..." class="w-full bg-slate-900 border border-blue-900/50 p-3 rounded-xl text-sm outline-none focus:border-blue-500">
                </div>

                <div class="flex gap-2 pt-2">
                    <button onclick="fetchFromGitHub()" class="flex-1 bg-slate-700 py-3 rounded-xl text-xs font-bold active:bg-slate-600 transition-all">🐙 情報を同期</button>
                    <button onclick="saveKeys()" class="flex-1 bg-blue-600 py-3 rounded-xl text-xs font-bold active:bg-blue-500 shadow-lg transition-all">💾 ブラウザに保存</button>
                </div>
            </div>
        </section>

        <details class="bg-slate-800 rounded-2xl border border-red-900/30 mb-6 overflow-hidden">
            <summary class="p-4 text-[10px] font-bold text-red-400 uppercase cursor-pointer flex justify-between">Failure Monitor (R2 Logs) <span>▼</span></summary>
            <div id="logContent" class="p-4 bg-slate-950 text-[10px] font-mono h-40 overflow-y-auto space-y-2 border-t border-slate-900">
                <div class="text-slate-700 italic">Syncing with R2...</div>
            </div>
        </details>

        <section class="space-y-4 mb-10">
            <h2 class="text-[10px] font-bold text-purple-400 uppercase tracking-widest ml-1">Pipeline Orchestration</h2>
            <textarea id="rssFeeds" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-sm h-32 outline-none focus:ring-1 ring-purple-500" placeholder="RSSフィードURL (1行に1つ)"></textarea>
            
            <div id="agentList" class="space-y-4"></div>
            
            <button onclick="addAgent()" class="w-full py-4 border-2 border-dashed border-slate-700 rounded-2xl text-slate-500 font-bold text-xs active:bg-slate-800 transition-all">
                + Append Intelligence Agent
            </button>
        </section>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-900/90 backdrop-blur-xl border-t border-slate-800 safe-area-bottom z-50">
            <button onclick="saveToR2()" class="w-full bg-gradient-to-r from-red-600 to-rose-600 py-4 rounded-2xl font-black text-lg shadow-2xl active:scale-95 transition-all">
                🚀 R2へ保存 & デプロイ
            </button>
        </div>
    </div>

    <input id="accId" type="hidden"><input id="keyId" type="hidden">

    <script>
        let workflow = [];

        async function fetchFromGitHub() {
            const token = document.getElementById('ghToken').value;
            const repo = document.getElementById('ghRepo').value;
            const status = document.getElementById('syncStatus');
            if(!token || !repo) return;
            
            status.innerText = "GitHub Syncing...";
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/variables`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                data.variables.forEach(v => {
                    if (v.name === 'R2_ACCOUNT_ID') {
                        document.getElementById('accId').value = v.value;
                        document.getElementById('displayAccId').innerText = v.value.substring(0,8) + "...";
                    }
                    if (v.name === 'R2_ACCESS_KEY_ID') document.getElementById('keyId').value = v.value;
                });
                status.innerText = "GitHub: OK";
                checkStatus();
                // ID取得後、シークレットがあればR2読込開始
                if(document.getElementById('secKey').value) loadFromR2();
            } catch (e) { status.innerText = "Sync Error"; }
        }

        async function loadLogs() {
            try {
                const s3 = await getS3();
                const res = await s3.getObject({ Bucket: 'rss-reports', Key: 'error_log.json' }).promise();
                const logs = JSON.parse(res.Body.toString());
                document.getElementById('logContent').innerHTML = logs.map(l => 
                    `<div class="border-b border-slate-900 pb-1 mb-1">
                        <span class="text-slate-500">[${l.time.split(' ')[1]}]</span> 
                        <span class="text-red-400 font-bold">${l.context}</span>: ${l.message}
                    </div>`
                ).join('');
            } catch (e) { document.getElementById('logContent').innerHTML = `<div class="text-slate-700 italic">No logs on R2.</div>`; }
        }

        function checkStatus() {
            const ind = document.getElementById('authIndicator');
            if(document.getElementById('secKey').value && document.getElementById('keyId').value) {
                ind.innerText = "READY";
                ind.classList.replace('text-yellow-500', 'text-green-400');
            }
        }

        function addAgent(data = { id: 'agent_' + (workflow.length + 1), model: 'gpt-4o-mini', prompt: '', enabled: true }) {
            workflow.push(data);
            render();
        }

        function render() {
            const container = document.getElementById('agentList');
            container.innerHTML = workflow.map((agent, i) => `
                <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-lg relative">
                    <div class="flex items-center gap-2 mb-3">
                        <input value="${agent.id}" onchange="workflow[${i}].id=this.value" class="bg-transparent font-black text-purple-400 text-sm w-32 outline-none border-b border-slate-800 focus:border-purple-500">
                        <select onchange="workflow[${i}].model=this.value" class="bg-slate-800 text-[10px] px-2 py-1 rounded-lg font-bold">
                            <option value="gpt-4o-mini" ${agent.model === 'gpt-4o-mini' ? 'selected' : ''}>4o-mini</option>
                            <option value="o3-mini" ${agent.model === 'o3-mini' ? 'selected' : ''}>o3-mini</option>
                        </select>
                        <div class="ml-auto flex gap-3">
                             <input type="checkbox" ${agent.enabled ? 'checked' : ''} onchange="workflow[${i}].enabled=this.checked" class="w-5 h-5 accent-purple-500">
                             <button onclick="workflow.splice(${i},1);render()" class="text-slate-600">✕</button>
                        </div>
                    </div>
                    <textarea onchange="workflow[${i}].prompt=this.value" class="w-full bg-slate-900 p-3 rounded-xl text-xs h-32 text-slate-300 outline-none focus:ring-1 ring-purple-500 shadow-inner" placeholder="System Prompt...">${agent.prompt}</textarea>
                </div>
            `).join('');
        }

        async function getS3() {
            return new AWS.S3({
                endpoint: `https://${document.getElementById('accId').value}.r2.cloudflarestorage.com`,
                accessKeyId: document.getElementById('keyId').value,
                secretAccessKey: document.getElementById('secKey').value,
                signatureVersion: 'v4', region: 'auto'
            });
        }

        async function loadFromR2() {
            const status = document.getElementById('syncStatus');
            try {
                const s3 = await getS3();
                const res = await s3.getObject({ Bucket: 'rss-reports', Key: 'prompts.json' }).promise();
                const config = JSON.parse(res.Body.toString());
                document.getElementById('rssFeeds').value = config.rss_feeds.join('\n');
                workflow = config.workflow;
                render();
                await loadLogs();
                status.innerText = "Connected to R2";
            } catch(e) { status.innerText = "R2 Error"; }
        }

        async function saveToR2() {
            try {
                const s3 = await getS3();
                const config = {
                    rss_feeds: document.getElementById('rssFeeds').value.split('\n').filter(l => l.trim()),
                    workflow: workflow,
                    settings: { fetch_days: 3, score_threshold: 7, embedding_model: "text-embedding-3-small", similarity_threshold: 0.85 }
                };
                await s3.putObject({
                    Bucket: 'rss-reports', Key: 'prompts.json',
                    Body: JSON.stringify(config, null, 2), ContentType: 'application/json'
                }).promise();
                alert('Success: R2 updated!');
            } catch(e) { alert("Save Error: Check Secret Key & Permissions."); }
        }

        function saveKeys() {
            localStorage.setItem('orch_mobile_secure_v1', JSON.stringify({
                ghRepo: document.getElementById('ghRepo').value,
                ghToken: document.getElementById('ghToken').value,
                secKey: document.getElementById('secKey').value // ブラウザのローカルストレージにのみ保存
            }));
            alert('Credentials saved in browser.');
            fetchFromGitHub();
        }

        window.onload = async () => {
            const saved = JSON.parse(localStorage.getItem('orch_mobile_secure_v1') || '{}');
            if (saved.ghToken) {
                document.getElementById('ghToken').value = saved.ghToken;
                document.getElementById('ghRepo').value = saved.ghRepo;
                document.getElementById('secKey').value = saved.secKey || '';
                await fetchFromGitHub();
            }
        };
    </script>
</body>
</html>
